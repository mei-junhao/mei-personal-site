name: Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject API Keys
        run: |
          sed -i "s/sk-your-deepseek-api-key/${{ secrets.DEEPSEEK_KEY }}/g" index.html
          sed -i "s/your-emailjs-public-key/${{ secrets.EMAILJS_PUBLIC_KEY }}/g" index.html
          sed -i "s/your-service-id/${{ secrets.EMAILJS_SERVICE_ID }}/g" index.html
          sed -i "s/your-template-id/${{ secrets.EMAILJS_TEMPLATE_ID }}/g" index.html
          sed -i "s/你的邮箱/985729106@qq.com/g" .env.example 2>/dev/null || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
